# Pages CMS Configuration Configuration
# Learn more: https://pagescms.org/docs/configuration

media:
  input: public/images
  output: /images

content:
  - name: audit_homes
    label: Audit Registry
    path: src/data/audit_homes/{id}.json
    view:
      primary: title
      description: desc
    fields:
      - name: id
        label: Internal ID
        type: string
        default: "h7"
      - name: isVideo
        label: "Is Video? (Checked: Video, Unchecked: Photo)"
        type: boolean
        default: false
      - name: videoUrl
        label: Video URL (Cloudinary / MP4 link - if Video)
        type: string
      - name: image
        label: Photo Image URL (if Photo)
        type: string
      - name: title
        label: Title
        type: string
      - name: loc
        label: Location
        type: string
      - name: status
        label: Status
        type: string
      - name: desc
        label: Description
        type: text
